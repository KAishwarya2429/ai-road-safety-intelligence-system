<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔥 Premium Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <title>AI Road Safety Intelligence System</title>

    <style>
      /* 🌍 Global Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #ffffff;
        min-height: 100vh;
      }

      #root {
        padding: 20px;
        max-width: 1100px;
        margin: auto;
      }

      /* 🏆 Headings */
      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: 25px;
        background: linear-gradient(90deg, #38bdf8, #60a5fa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      h2 {
        margin-bottom: 10px;
        font-weight: 600;
      }

      h3 {
        margin-bottom: 5px;
      }

      /* ✨ Glass UI */
      .glass {
        background: rgba(255, 255, 255, 0.08);

        /* ✅ Safari support */
        -webkit-backdrop-filter: blur(14px);

        /* ✅ Standard */
        backdrop-filter: blur(14px);

        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;

        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      }

      /* 💬 Input */
      input {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        font-size: 14px;
      }

      /* 🚀 Button */
      button {
        background: linear-gradient(135deg, #3b82f6, #06b6d4);
        border: none;
        padding: 12px 18px;
        border-radius: 10px;
        color: white;
        cursor: pointer;
        font-weight: 600;
        margin-left: 10px;
        transition: all 0.3s ease;
      }

      button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
      }

      /* 📊 Cards */
      .card {
        padding: 15px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        margin-top: 10px;
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      /* 🚨 Risk Colors */
      .high {
        border-left: 6px solid #ef4444;
      }

      .medium {
        border-left: 6px solid #f59e0b;
      }

      .low {
        border-left: 6px solid #10b981;
      }

      /* 🎯 Badges */
      .badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        margin-left: 10px;
      }

      .badge.high {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
      }

      .badge.medium {
        background: rgba(245, 158, 11, 0.2);
        color: #f59e0b;
      }

      .badge.low {
        background: rgba(16, 185, 129, 0.2);
        color: #10b981;
      }

      /* 🗺 Map */
      iframe {
        margin-top: 10px;
        border-radius: 12px;
        border: none;
        width: 100%;
        height: 250px;
      }

      /* ⏳ Spinner */
      .spinner {
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-top: 4px solid #38bdf8;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: 10px auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* 📱 Responsive */
      @media (max-width: 600px) {
        h1 {
          font-size: 1.8rem;
        }

        button {
          padding: 10px;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
